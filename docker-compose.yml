services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    environment:
      APP_NAME: Laravel Health Check API
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: base64:SLP8tTzI8F4ufUfGLs9Xvr+L6gTL2X2ccwzvVtV3+Jw=
      APP_URL: http://localhost:8080
      LOG_CHANNEL: stack
      LOG_LEVEL: info
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: healthcheck
      DB_USERNAME: laravel
      DB_PASSWORD: laravel
      CACHE_STORE: redis
      CACHE_LIMITER: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: database
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./:/var/www:ro
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    command: ["mysqld", "--mysql-native-password=ON"]
    environment:
      MYSQL_DATABASE: healthcheck
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "${MYSQL_FORWARD_PORT:-13306}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
      - mysql-data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
